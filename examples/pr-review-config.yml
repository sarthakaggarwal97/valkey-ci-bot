# Example configuration for the PR reviewer bot.
#
# Copy this file to:
#   .github/pr-review-bot.yml

reviewer:
  enabled: true
  collaborator_only: false
  disable_review: false
  disable_release_notes: false
  review_simple_changes: false
  review_comment_lgtm: false
  ignore_keyword: "/reviewbot: ignore"
  max_files: 150
  max_review_comments: 20
  daily_token_budget: 1000000
  bedrock_retries: 5
  github_retries: 5
  bedrock_timeout_ms: 120000
  bedrock_concurrency_limit: 2
  github_concurrency_limit: 6
  path_filters:
    - "!dist/**"
    - "!vendor/**"
    - "!**/*.lock"
    - "!**/*.png"
    - "!**/*.jpg"
    - "src/**"
    - "tests/**"
  models:
    light_model_id: "us.anthropic.claude-opus-4-6-v1"
    heavy_model_id: "us.anthropic.claude-opus-4-6-v1"
    temperature: 0.05
