# Example caller workflow for consumer repositories.
#
# Copy this file to:
#   .github/workflows/pr-review-bot.yml
#
# Recommended repository configuration:
#   Secret:   CI_BOT_AWS_ROLE_ARN
#   Variable: CI_BOT_AWS_REGION
#
name: PR Review Bot

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      mode: ${{ steps.classify.outputs.mode }}
      allowed: ${{ steps.classify.outputs.allowed }}
    steps:
      - id: classify
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            if (eventName === "pull_request_target") {
              core.setOutput("mode", "review");
              core.setOutput("allowed", "true");
              return;
            }
            if (eventName === "pull_request_review_comment") {
              core.setOutput("mode", "chat");
              core.setOutput("allowed", "true");
              return;
            }
            const issue = context.payload.issue;
            const isPr = !!issue?.pull_request;
            const body = context.payload.comment?.body || "";
            const invoked = body.includes("/reviewbot");
            core.setOutput("mode", isPr && invoked ? "chat" : "skip");
            core.setOutput("allowed", isPr && invoked ? "true" : "false");

  review:
    needs: preflight
    if: needs.preflight.outputs.allowed == 'true'
    uses: valkey-io/valkey-ci-agent/.github/workflows/review-pr.yml@REPLACE_WITH_RELEASE_SHA
    with:
      config_path: .github/pr-review-bot.yml
      aws_region: ${{ vars.CI_BOT_AWS_REGION || 'us-east-1' }}
      github_app_id: ${{ vars.VALKEY_GITHUB_APP_ID || '' }}
      mode: ${{ needs.preflight.outputs.mode }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.CI_BOT_AWS_ROLE_ARN }}
      VALKEY_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
      VALKEY_GITHUB_APP_PRIVATE_KEY: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
