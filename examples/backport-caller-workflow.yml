# Example caller workflow for consumer repositories.
#
# Copy this file to your repository as:
#   .github/workflows/backport-agent.yml
#
# This workflow triggers the Backport Agent when a merged PR is labeled with
# a `backport <branch>` label (e.g. `backport 8.1`). It checks that the PR
# is merged, extracts the target branch from the newly added label, and
# triggers one backport run for that target branch.
#
# Required consumer-repo setup:
#   Secret:   CI_BOT_AWS_ROLE_ARN        — IAM role assumable via GitHub OIDC
#   Variable: CI_BOT_AWS_REGION          — optional, defaults to us-east-1
#
# Pin the reusable workflow to a trusted release tag or full commit SHA in
# production instead of tracking a moving branch, and set `agent_ref` below to
# the same trusted ref.
name: Backport Agent

permissions:
  contents: write
  pull-requests: write
  actions: read
  id-token: write

on:
  pull_request_target:
    types: [labeled]

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      branches: ${{ steps.extract.outputs.branches }}
      should_run: ${{ steps.extract.outputs.should_run }}
    steps:
      - id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Only proceed if the PR is merged.
            if (!pr.merged) {
              core.info("PR is not merged. Skipping backport (pr-not-merged).");
              core.setOutput("should_run", "false");
              core.setOutput("branches", "[]");
              return;
            }

            // Extract the target branch from the label that triggered this event.
            const backportPrefix = "backport ";
            const labelName = context.payload.label?.name || "";
            if (!labelName.startsWith(backportPrefix)) {
              core.info("Added label is not a backport label.");
              core.setOutput("should_run", "false");
              core.setOutput("branches", "[]");
              return;
            }

            const branch = labelName.slice(backportPrefix.length).trim();
            const branches = branch ? [branch] : [];

            if (branches.length === 0) {
              core.info("Backport label has no target branch.");
              core.setOutput("should_run", "false");
              core.setOutput("branches", "[]");
              return;
            }

            core.info(`Found backport targets: ${branches.join(", ")}`);
            core.setOutput("should_run", "true");
            core.setOutput("branches", JSON.stringify(branches));

  backport:
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        target_branch: ${{ fromJson(needs.preflight.outputs.branches) }}
    uses: sarthakaggarwal97/valkey-ci-agent/.github/workflows/backport.yml@main
    with:
      source_pr_number: ${{ github.event.pull_request.number }}
      repo_full_name: ${{ github.repository }}
      target_branch: ${{ matrix.target_branch }}
      config_path: .github/backport-agent.yml
      aws_region: ${{ vars.CI_BOT_AWS_REGION || 'us-east-1' }}
      agent_repository: sarthakaggarwal97/valkey-ci-agent
      agent_ref: main
    secrets:
      AWS_ROLE_ARN: ${{ secrets.CI_BOT_AWS_ROLE_ARN }}
