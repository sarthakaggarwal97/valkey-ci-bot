# Example Backport Agent configuration for consumer repositories.
#
# Copy this file to your repository as:
#   .github/backport-agent.yml
#
# All settings are optional — the agent uses sensible defaults when a field is
# missing. Remove or comment out any section you don't need to customize.

# ---------------------------------------------------------------------------
# Conflict resolution settings
# ---------------------------------------------------------------------------

# Maximum number of retry attempts when the LLM produces a resolution that
# still contains conflict markers. Each retry includes feedback about the
# remaining markers.
max_conflict_retries: 2

# Maximum number of conflicting files the agent will attempt to resolve via
# the LLM. If the cherry-pick produces more conflicts than this limit, the
# agent creates the backport PR with all conflicts left unresolved.
max_conflicting_files: 20

# Per-backport token budget for Bedrock API calls. If the budget is exhausted
# during conflict resolution, remaining files are left unresolved.
per_backport_token_budget: 100000

# ---------------------------------------------------------------------------
# Safety limits
# ---------------------------------------------------------------------------

# Maximum backport PRs the agent will create in a rolling 24-hour window.
# Once the limit is reached, subsequent backport requests are skipped with
# a comment on the source PR.
max_prs_per_day: 10

# ---------------------------------------------------------------------------
# Labels
# ---------------------------------------------------------------------------

# Label applied to generated backport PRs. The example caller workflow listens
# for labels matching "backport <branch>" unless you update its preflight script.
backport_label: "backport"

# Warning label applied to backport PRs where one or more files were resolved
# by the LLM, signaling that extra review attention is needed.
llm_conflict_label: "llm-resolved-conflicts"
