name: Monitor Valkey CI Failures

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:
    inputs:
      workflow_scope:
        description: "Workflow surface to inspect."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - ci
          - daily
          - external
          - weekly
      dry_run:
        description: "List candidate runs without processing them or advancing state."
        required: false
        default: true
        type: boolean
      max_runs:
        description: "Maximum recent runs per monitored event to inspect."
        required: false
        default: "14"
        type: string
      verbose:
        description: "Enable verbose monitor logging."
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    name: Monitor ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - scope: ci
            label: CI
            workflow_file: ci.yml
            monitor_events: "pull_request,push"
            max_runs: "14"
          - scope: daily
            label: Daily
            workflow_file: daily.yml
            monitor_events: "schedule,pull_request"
            max_runs: "14"
          - scope: external
            label: External
            workflow_file: external.yml
            monitor_events: "schedule,pull_request,push"
            max_runs: "14"
          - scope: weekly
            label: Weekly
            workflow_file: weekly.yml
            monitor_events: "schedule"
            max_runs: "4"
    concurrency:
      group: monitor-valkey-ci-${{ matrix.scope }}
      cancel-in-progress: false
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      MONITOR_DRY_RUN: ${{ github.event_name != 'workflow_dispatch' && 'false' || github.event.inputs.dry_run || 'true' }}
      MONITOR_MAX_RUNS: ${{ github.event.inputs.max_runs || matrix.max_runs || '14' }}
      MONITOR_VERBOSE: ${{ github.event.inputs.verbose || 'false' }}
      MONITOR_SCOPE: ${{ matrix.scope }}
      MONITOR_WORKFLOW_FILE: ${{ matrix.workflow_file }}
      MONITOR_EVENTS: ${{ matrix.monitor_events }}
      MONITOR_SCOPE_SELECTED: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.workflow_scope == 'all' || github.event.inputs.workflow_scope == matrix.scope }}
      CI_BOT_COMMIT_NAME: ${{ vars.CI_BOT_COMMIT_NAME || '' }}
      CI_BOT_COMMIT_EMAIL: ${{ vars.CI_BOT_COMMIT_EMAIL || '' }}
      CI_BOT_REQUIRE_DCO_SIGNOFF: ${{ vars.CI_BOT_REQUIRE_DCO_SIGNOFF || 'false' }}
      VALKEY_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
      VALKEY_GITHUB_APP_ID: ${{ vars.VALKEY_GITHUB_APP_ID || '' }}
      VALKEY_GITHUB_APP_PRIVATE_KEY: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
      VALKEY_FORK_REPO: ${{ vars.VALKEY_FORK_REPO || 'sarthakaggarwal97/valkey' }}
      VALKEY_FORK_GITHUB_TOKEN: ${{ secrets.VALKEY_FORK_GITHUB_TOKEN }}
    steps:
      - name: Check out agent repository
        if: ${{ env.MONITOR_SCOPE_SELECTED == 'true' }}
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        if: ${{ env.MONITOR_SCOPE_SELECTED == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: ${{ env.MONITOR_SCOPE_SELECTED == 'true' }}
        run: pip install -r requirements.txt

      - name: Validate target repository authentication inputs
        if: ${{ env.MONITOR_SCOPE_SELECTED == 'true' && env.VALKEY_GITHUB_TOKEN == '' && (env.VALKEY_GITHUB_APP_ID == '' || env.VALKEY_GITHUB_APP_PRIVATE_KEY == '') }}
        run: |
          echo "Configure either VALKEY_GITHUB_TOKEN or VALKEY_GITHUB_APP_ID plus VALKEY_GITHUB_APP_PRIVATE_KEY." >&2
          exit 1

      - name: Create target repository GitHub App token
        id: app-token
        if: ${{ env.MONITOR_SCOPE_SELECTED == 'true' && env.VALKEY_GITHUB_TOKEN == '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.VALKEY_GITHUB_APP_ID }}
          private-key: ${{ env.VALKEY_GITHUB_APP_PRIVATE_KEY }}
          owner: valkey-io
          repositories: valkey
          permission-actions: read
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Select target repository token
        id: target-token
        if: ${{ env.MONITOR_SCOPE_SELECTED == 'true' }}
        shell: bash
        run: |
          if [[ -n "${VALKEY_GITHUB_TOKEN}" ]]; then
            echo "token=${VALKEY_GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            echo "token=${{ steps.app-token.outputs.token }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials from OIDC role
        if: ${{ env.MONITOR_SCOPE_SELECTED == 'true' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: valkey-ci-monitor-${{ matrix.scope }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Monitor and queue Valkey workflow failures
        id: run-monitor
        if: ${{ env.MONITOR_SCOPE_SELECTED == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            -m scripts.monitor_workflow_runs
            --target-repo "valkey-io/valkey"
            --workflow-file "${MONITOR_WORKFLOW_FILE}"
            --config ".github/valkey-daily-bot.yml"
            --target-token "${{ steps.target-token.outputs.token }}"
            --state-token "${{ github.token }}"
            --state-repo "${{ github.repository }}"
            --max-runs "${MONITOR_MAX_RUNS}"
            --aws-region "${AWS_REGION}"
            --queue-only
          )

          IFS=',' read -ra monitor_events <<< "${MONITOR_EVENTS}"
          for event_name in "${monitor_events[@]}"; do
            args+=(--event "${event_name}")
          done

          if [[ "${MONITOR_DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi

          if [[ "${MONITOR_VERBOSE}" == "true" ]]; then
            args+=(--verbose)
          fi

          python "${args[@]}" | tee monitor-result.json

      - name: Capture monitor outputs
        id: capture-monitor
        if: ${{ always() && env.MONITOR_SCOPE_SELECTED == 'true' }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          result_path = Path("monitor-result.json")

          monitor_dry_run = os.environ["MONITOR_DRY_RUN"].lower() == "true"
          has_queued_failures = False
          queued_failure_count = 0

          if result_path.exists():
              raw_result = result_path.read_text(encoding="utf-8").strip()
              if raw_result:
                  try:
                      result = json.loads(raw_result)
                  except json.JSONDecodeError:
                      result = {}
                  monitor_dry_run = bool(result.get("dry_run", monitor_dry_run))
                  has_queued_failures = bool(result.get("has_queued_failures", False))
                  queued_failure_count = int(result.get("queued_failure_count", 0))

          with output_path.open("a", encoding="utf-8") as fh:
              fh.write(
                  f"monitor_dry_run={'true' if monitor_dry_run else 'false'}\n"
              )
              fh.write(
                  f"has_queued_failures={'true' if has_queued_failures else 'false'}\n"
              )
              fh.write(f"queued_failure_count={queued_failure_count}\n")
          PY

      - name: Select fork repository token
        id: fork-token
        if: ${{ env.MONITOR_SCOPE_SELECTED == 'true' && steps.capture-monitor.outputs.monitor_dry_run != 'true' && steps.capture-monitor.outputs.has_queued_failures == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${VALKEY_FORK_GITHUB_TOKEN}" ]]; then
            echo "token=${VALKEY_FORK_GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${VALKEY_GITHUB_TOKEN}" ]]; then
            echo "token=${VALKEY_GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            echo "Configure VALKEY_FORK_GITHUB_TOKEN or a VALKEY_GITHUB_TOKEN with write access to ${VALKEY_FORK_REPO}." >&2
            exit 1
          fi

      - name: Validate fork base branches for queued fixes
        if: ${{ env.MONITOR_SCOPE_SELECTED == 'true' && steps.capture-monitor.outputs.monitor_dry_run != 'true' && steps.capture-monitor.outputs.has_queued_failures == 'true' }}
        shell: bash
        run: |
          python -m scripts.preflight_reconciliation \
            --repo "${VALKEY_FORK_REPO}" \
            --token "${{ steps.fork-token.outputs.token }}" \
            --state-token "${{ github.token }}" \
            --state-repo "${{ github.repository }}" | tee reconcile-preflight.json

      - name: Create draft PRs for queued fixes
        if: ${{ env.MONITOR_SCOPE_SELECTED == 'true' && steps.capture-monitor.outputs.monitor_dry_run != 'true' && steps.capture-monitor.outputs.has_queued_failures == 'true' }}
        shell: bash
        run: |
          python -m scripts.main \
            --mode reconcile \
            --repo "${VALKEY_FORK_REPO}" \
            --config ".github/valkey-daily-bot.yml" \
            --token "${{ steps.fork-token.outputs.token }}" \
            --state-token "${{ github.token }}" \
            --state-repo "${{ github.repository }}" \
            --draft-prs

      - name: Upload monitor result
        if: ${{ always() && env.MONITOR_SCOPE_SELECTED == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: valkey-${{ matrix.scope }}-monitor-result-${{ github.run_id }}
          path: monitor-result.json
          if-no-files-found: warn
          retention-days: 14

  dashboard:
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.workflow_scope == 'all' || github.event.inputs.workflow_scope == 'daily') }}
    name: Build dashboard
    needs: monitor
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: monitor-valkey-ci-dashboard
      cancel-in-progress: false
    steps:
      - name: Check out agent repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Daily monitor result
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: valkey-daily-monitor-result-${{ github.run_id }}
          path: daily-monitor

      - name: Check out agent data snapshots
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          ref: bot-data
          path: bot-data
          persist-credentials: false
          fetch-depth: 1

      - name: Backfill durable daily health history
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python3 -m scripts.backfill_daily_health_history \
            --repo "valkey-io/valkey" \
            --workflow "daily.yml" "weekly.yml" \
            --branch "unstable" \
            --days 14 \
            --token "${GITHUB_TOKEN}" \
            --state-token "${GITHUB_TOKEN}" \
            --state-repo "${{ github.repository }}" \
            --mirror-dir "bot-data/dashboard-history/daily-health"

      - name: Generate daily CI health report
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python3 -m scripts.daily_health_report \
            --repo "valkey-io/valkey" \
            --workflow "daily.yml" "weekly.yml" \
            --branch "unstable" \
            --days 14 \
            --token "${GITHUB_TOKEN}" \
            --history-dir "bot-data/dashboard-history/daily-health" \
            --output daily-health-report.html \
            --output-json daily-health-report.json

      - name: Generate capability dashboard
        shell: bash
        run: |
          set -euo pipefail
          args=(
            -m scripts.agent_dashboard
            --failure-store bot-data/failure-store.json
            --rate-state bot-data/rate-state.json
            --monitor-state bot-data/monitor-state.json
            --review-state bot-data/review-state.json
            --event-log bot-data/agent-events.jsonl
            --output-markdown agent-dashboard.md
            --output-json agent-dashboard.json
            --output-html agent-dashboard.html
          )

          if [[ -f "daily-monitor/monitor-result.json" ]]; then
            args+=(--daily-result "daily-monitor/monitor-result.json")
          fi

          if [[ -f "daily-health-report.json" ]]; then
            args+=(--daily-health "daily-health-report.json")
          fi

          python3 "${args[@]}"

      - name: Generate observability site
        shell: bash
        run: |
          python3 -m scripts.agent_dashboard_site \
            --dashboard-json agent-dashboard.json \
            --site-dir dashboard-site

      - name: Publish capability dashboard to summary
        shell: bash
        run: cat agent-dashboard.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload capability dashboard
        uses: actions/upload-artifact@v4
        with:
          name: valkey-ci-agent-dashboard-${{ github.run_id }}
          path: |
            agent-dashboard.md
            agent-dashboard.json
            agent-dashboard.html
            daily-monitor
            daily-health-report.html
            daily-health-report.json
            dashboard-site
          retention-days: 30
