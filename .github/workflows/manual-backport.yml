name: Manual Backport

on:
  workflow_dispatch:
    inputs:
      pr_url:
        description: "PR URL or number (e.g. https://github.com/valkey-io/valkey/pull/1234 or just 1234)"
        required: true
        type: string
      repo:
        description: "Target repository (owner/repo) — only needed if pr_url is a plain number"
        required: false
        type: string
        default: "valkey-io/valkey"
      target_branch:
        description: "Target branch to backport onto (e.g. 8.1, 8.0)"
        required: true
        type: string
      push_to_fork:
        description: "Push backport PR to this fork instead of the source repo (e.g. sarthakaggarwal97/valkey)"
        required: false
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  parse-inputs:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.parse.outputs.pr_number }}
      repo: ${{ steps.parse.outputs.repo }}
    steps:
      - name: Parse PR URL or number
        id: parse
        run: |
          INPUT="${{ inputs.pr_url }}"
          # If it looks like a URL, extract owner/repo and PR number
          if [[ "$INPUT" =~ github\.com/([^/]+/[^/]+)/pull/([0-9]+) ]]; then
            echo "repo=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "pr_number=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          elif [[ "$INPUT" =~ ^[0-9]+$ ]]; then
            echo "repo=${{ inputs.repo }}" >> "$GITHUB_OUTPUT"
            echo "pr_number=$INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Could not parse PR input: $INPUT. Use a URL or a number."
            exit 1
          fi

  backport:
    needs: parse-inputs
    uses: ./.github/workflows/backport.yml
    with:
      source_pr_number: ${{ fromJSON(needs.parse-inputs.outputs.pr_number) }}
      repo_full_name: ${{ needs.parse-inputs.outputs.repo }}
      target_branch: ${{ inputs.target_branch }}
      push_repo: ${{ inputs.push_to_fork }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      VALKEY_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
