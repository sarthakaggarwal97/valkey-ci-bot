name: Publish Dashboard Site

on:
  workflow_run:
    workflows:
      - CI
      - CI Agent Capability Dashboard
      - CI Agent Replay Lab
      - Monitor Valkey Daily Failures
      - Monitor Valkey Fuzzer Runs
      - Review Pull Request
      - Review External Pull Request
      - Backport PR
      - Analyze CI Failure
    types:
      - completed
  schedule:
    - cron: "43 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == github.event.repository.default_branch
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: publish-dashboard-site
      cancel-in-progress: true
    steps:
      - name: Check out agent repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: pip install -r requirements.txt

      - name: Check out agent data snapshots
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          ref: bot-data
          path: bot-data
          persist-credentials: false
          fetch-depth: 1

      - name: Generate daily CI health report
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python3 -m scripts.daily_health_report \
            --repo "valkey-io/valkey" \
            --workflow "daily.yml" \
            --branch "unstable" \
            --days 14 \
            --token "${GITHUB_TOKEN}" \
            --output daily-health-report.html \
            --output-json daily-health-report.json

      - name: Run replay acceptance scorecard
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python3 -m scripts.valkey_acceptance \
            --manifest examples/valkey-acceptance.yml \
            --token "${GITHUB_TOKEN}" \
            --output acceptance-report.md \
            --json-output acceptance-report.json

      - name: Generate capability dashboard
        shell: bash
        run: |
          python3 -m scripts.agent_dashboard \
            --failure-store bot-data/failure-store.json \
            --rate-state bot-data/rate-state.json \
            --monitor-state bot-data/monitor-state.json \
            --review-state bot-data/review-state.json \
            --event-log bot-data/agent-events.jsonl \
            --acceptance-result acceptance-report.json \
            --daily-health daily-health-report.json \
            --output-markdown agent-dashboard.md \
            --output-json agent-dashboard.json \
            --output-html agent-dashboard.html

      - name: Generate observability site
        shell: bash
        run: |
          python3 -m scripts.agent_dashboard_site \
            --dashboard-json agent-dashboard.json \
            --site-dir dashboard-site

      - name: Upload dashboard site artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-site-${{ github.run_id }}
          path: |
            dashboard-site
            agent-dashboard.md
            agent-dashboard.json
            agent-dashboard.html
            acceptance-report.md
            acceptance-report.json
            daily-health-report.html
            daily-health-report.json
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dashboard-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@v4
