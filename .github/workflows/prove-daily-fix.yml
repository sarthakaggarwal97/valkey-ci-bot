name: Prove Daily Fix

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Full name of the fork repository that owns the draft PR"
        required: true
        type: string
      pr_number:
        description: "Draft PR number to prove"
        required: true
        type: string
      fingerprint:
        description: "Failure fingerprint for the draft fix"
        required: true
        type: string
      config_path:
        description: "CI agent config path"
        required: true
        default: ".github/valkey-daily-bot.yml"
        type: string
      repeat_count:
        description: "Required consecutive GitHub-native proof runs"
        required: true
        type: string
      failure_report_json:
        description: "Serialized FailureReport payload for the fix"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prove:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: prove-daily-fix-${{ inputs.target_repo }}-${{ inputs.pr_number }}
      cancel-in-progress: false
    env:
      VALKEY_GITHUB_APP_ID: ${{ vars.VALKEY_GITHUB_APP_ID || '' }}
      TARGET_REPO: ${{ inputs.target_repo }}
      TARGET_PR_NUMBER: ${{ inputs.pr_number }}
      FINGERPRINT: ${{ inputs.fingerprint }}
      CONFIG_PATH: ${{ inputs.config_path }}
      REPEAT_COUNT: ${{ inputs.repeat_count }}
    steps:
      - name: Checkout agent repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve target repository
        id: target-repo
        shell: bash
        run: |
          set -euo pipefail
          owner="${TARGET_REPO%%/*}"
          repository="${TARGET_REPO#*/}"
          if [[ ! "${TARGET_REPO}" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Expected TARGET_REPO in owner/repo format, got '${TARGET_REPO}'." >&2
            exit 1
          fi
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "repository=${repository}" >> "$GITHUB_OUTPUT"

      - name: Resolve target repository authentication mode
        id: target-auth
        shell: bash
        env:
          VALKEY_FORK_GITHUB_TOKEN: ${{ secrets.VALKEY_FORK_GITHUB_TOKEN }}
          VALKEY_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
          VALKEY_GITHUB_APP_PRIVATE_KEY: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "${VALKEY_FORK_GITHUB_TOKEN}" || -n "${VALKEY_GITHUB_TOKEN}" ]]; then
            echo "use-app=false" >> "$GITHUB_OUTPUT"
          elif [[ -n "${VALKEY_GITHUB_APP_ID}" && -n "${VALKEY_GITHUB_APP_PRIVATE_KEY}" ]]; then
            echo "use-app=true" >> "$GITHUB_OUTPUT"
          else
            echo "Configure VALKEY_FORK_GITHUB_TOKEN, VALKEY_GITHUB_TOKEN, or VALKEY_GITHUB_APP_ID plus VALKEY_GITHUB_APP_PRIVATE_KEY for proof campaigns." >&2
            exit 1
          fi

      - name: Create target repository GitHub App token
        id: target-app-token
        if: ${{ steps.target-auth.outputs.use-app == 'true' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.VALKEY_GITHUB_APP_ID }}
          private-key: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ steps.target-repo.outputs.owner }}
          repositories: ${{ steps.target-repo.outputs.repository }}
          permission-actions: read
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Select target repository token
        id: target-token
        shell: bash
        env:
          VALKEY_FORK_GITHUB_TOKEN: ${{ secrets.VALKEY_FORK_GITHUB_TOKEN }}
          VALKEY_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
          APP_TOKEN: ${{ steps.target-app-token.outputs.token }}
        run: |
          set -euo pipefail
          if [[ -n "${VALKEY_FORK_GITHUB_TOKEN}" ]]; then
            echo "token=${VALKEY_FORK_GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${VALKEY_GITHUB_TOKEN}" ]]; then
            echo "token=${VALKEY_GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${APP_TOKEN}" ]]; then
            echo "token=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            echo "Unable to resolve target repository token." >&2
            exit 1
          fi

      - name: Resolve landing repository auth mode
        id: landing-auth
        shell: bash
        env:
          VALKEY_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
          VALKEY_GITHUB_APP_PRIVATE_KEY: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "${VALKEY_GITHUB_TOKEN}" ]]; then
            echo "use-app=false" >> "$GITHUB_OUTPUT"
          elif [[ -n "${VALKEY_GITHUB_APP_ID}" && -n "${VALKEY_GITHUB_APP_PRIVATE_KEY}" ]]; then
            echo "use-app=true" >> "$GITHUB_OUTPUT"
          else
            echo "use-app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create upstream GitHub App token
        id: app-token
        if: ${{ steps.landing-auth.outputs.use-app == 'true' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.VALKEY_GITHUB_APP_ID }}
          private-key: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
          owner: valkey-io
          repositories: valkey
          permission-actions: read
          permission-contents: write
          permission-pull-requests: write

      - name: Select landing repository token
        id: landing-token
        shell: bash
        env:
          VALKEY_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          if [[ -n "${VALKEY_GITHUB_TOKEN}" ]]; then
            echo "token=${VALKEY_GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${APP_TOKEN}" ]]; then
            echo "token=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            echo "token=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run proof campaign
        shell: bash
        env:
          FAILURE_REPORT_JSON: ${{ inputs.failure_report_json }}
          TARGET_TOKEN: ${{ steps.target-token.outputs.token }}
          LANDING_TOKEN: ${{ steps.landing-token.outputs.token }}
          STATE_TOKEN: ${{ github.token }}
          STATE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ ! "${TARGET_REPO}" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid target_repo: ${TARGET_REPO}" >&2
            exit 1
          fi
          if [[ ! "${TARGET_PR_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "Invalid pr_number: ${TARGET_PR_NUMBER}" >&2
            exit 1
          fi
          if [[ "${CONFIG_PATH}" == /* || "${CONFIG_PATH}" == *..* || "${CONFIG_PATH}" == -* ]]; then
            echo "Invalid config_path: ${CONFIG_PATH}" >&2
            exit 1
          fi
          if [[ ! "${REPEAT_COUNT}" =~ ^[0-9]+$ ]]; then
            echo "Invalid repeat_count: ${REPEAT_COUNT}" >&2
            exit 1
          fi
          python -m scripts.prove_pr_fix \
            --repo "${TARGET_REPO}" \
            --pr-number "${TARGET_PR_NUMBER}" \
            --fingerprint "${FINGERPRINT}" \
            --failure-report-json "${FAILURE_REPORT_JSON}" \
            --config "${CONFIG_PATH}" \
            --token "${TARGET_TOKEN}" \
            --landing-token "${LANDING_TOKEN}" \
            --state-token "${STATE_TOKEN}" \
            --state-repo "${STATE_REPO}" \
            --repeat-count "${REPEAT_COUNT}" \
            --output proof-result.json

      - name: Publish proof summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("proof-result.json")
          if not path.exists():
              raise SystemExit(0)
          result = json.loads(path.read_text(encoding="utf-8"))
          lines = [
              "## Daily Fix Proof",
              "",
              f"- PR: {result.get('pr_url', '')}",
              f"- Status: **{result.get('proof_status', 'unknown')}**",
              f"- Consecutive runs: **{result.get('passed_runs', 0)}/{result.get('proof_runs', 0)}**",
          ]
          if result.get("proof_run_url"):
              lines.append(f"- Workflow run: {result['proof_run_url']}")
          if result.get("ready_for_review"):
              lines.append("- PR was marked ready for review automatically.")
          if result.get("landing_status") == "passed":
              lines.append(f"- Upstream landing: {result.get('landing_url', '')}")
          elif result.get("landing_status") == "failed":
              lines.append(f"- Upstream landing failed: {result.get('landing_summary', '')}")
          if result.get("comment_url"):
              lines.append(f"- Proof comment: {result['comment_url']}")
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload proof result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-fix-proof-${{ github.run_id }}
          path: proof-result.json
          if-no-files-found: warn
          retention-days: 14
