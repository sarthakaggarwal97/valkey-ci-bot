name: Review Pull Request

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to the PR reviewer configuration file in the consumer repo"
        required: false
        type: string
        default: ".github/pr-review-bot.yml"
      mode:
        description: "Reviewer mode: review, chat, or auto"
        required: false
        type: string
        default: "auto"
      aws_region:
        description: "AWS region where Bedrock is available"
        required: false
        type: string
        default: "us-east-1"
      github_app_id:
        description: "Optional GitHub App ID used when VALKEY_GITHUB_TOKEN is not provided"
        required: false
        type: string
        default: ""
    secrets:
      AWS_ROLE_ARN:
        required: true
      VALKEY_GITHUB_TOKEN:
        required: false
      VALKEY_GITHUB_APP_PRIVATE_KEY:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: review-pr-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Resolve called workflow ref
        id: called-workflow
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('valkey-ci-agent');
            const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64url').toString('utf8'));
            const workflowRef = payload.job_workflow_ref || '';
            const marker = '/.github/workflows/';
            const markerIndex = workflowRef.indexOf(marker);
            const refIndex = workflowRef.lastIndexOf('@');
            if (markerIndex <= 0 || refIndex <= markerIndex) {
              core.setFailed(`Could not resolve called workflow repository/ref from job_workflow_ref: ${workflowRef}`);
              return;
            }
            core.setOutput('repository', workflowRef.slice(0, markerIndex));
            core.setOutput('ref', workflowRef.slice(refIndex + 1));

      - name: Checkout agent repository
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.called-workflow.outputs.repository }}
          ref: ${{ steps.called-workflow.outputs.ref }}
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate workflow inputs
        shell: bash
        env:
          REVIEW_MODE: ${{ inputs.mode }}
          CONFIG_PATH: ${{ inputs.config_path }}
          AWS_REGION_INPUT: ${{ inputs.aws_region }}
        run: |
          set -euo pipefail
          if [[ "${REVIEW_MODE}" != "auto" && "${REVIEW_MODE}" != "review" && "${REVIEW_MODE}" != "chat" ]]; then
            echo "Invalid mode: ${REVIEW_MODE}" >&2
            exit 1
          fi
          if [[ "${CONFIG_PATH}" == /* || "${CONFIG_PATH}" == *..* || "${CONFIG_PATH}" == -* ]]; then
            echo "Invalid config_path: ${CONFIG_PATH}" >&2
            exit 1
          fi
          if [[ ! "${AWS_REGION_INPUT}" =~ ^[A-Za-z0-9-]+$ ]]; then
            echo "Invalid aws_region: ${AWS_REGION_INPUT}" >&2
            exit 1
          fi

      - name: Resolve repository
        id: target-repo
        shell: bash
        env:
          TARGET_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          owner="${TARGET_REPO%%/*}"
          repository="${TARGET_REPO#*/}"
          if [[ ! "${TARGET_REPO}" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Expected TARGET_REPO in owner/repo format, got '${TARGET_REPO}'." >&2
            exit 1
          fi
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "repository=${repository}" >> "$GITHUB_OUTPUT"

      - name: Resolve GitHub auth mode
        id: github-auth
        shell: bash
        env:
          VALKEY_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
          VALKEY_GITHUB_APP_ID: ${{ inputs.github_app_id || vars.VALKEY_GITHUB_APP_ID || '' }}
          VALKEY_GITHUB_APP_PRIVATE_KEY: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "${VALKEY_GITHUB_TOKEN}" ]]; then
            echo "use-app=false" >> "$GITHUB_OUTPUT"
          elif [[ -n "${VALKEY_GITHUB_APP_ID}" && -n "${VALKEY_GITHUB_APP_PRIVATE_KEY}" ]]; then
            echo "use-app=true" >> "$GITHUB_OUTPUT"
            echo "app-id=${VALKEY_GITHUB_APP_ID}" >> "$GITHUB_OUTPUT"
          else
            echo "use-app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App token
        id: app-token
        if: ${{ steps.github-auth.outputs.use-app == 'true' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ steps.github-auth.outputs.app-id }}
          private-key: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ steps.target-repo.outputs.owner }}
          repositories: ${{ steps.target-repo.outputs.repository }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Select GitHub token
        id: github-token
        shell: bash
        env:
          VALKEY_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          FALLBACK_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ -n "${VALKEY_GITHUB_TOKEN}" ]]; then
            echo "token=${VALKEY_GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${APP_TOKEN}" ]]; then
            echo "token=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            echo "token=${FALLBACK_TOKEN}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials from OIDC role
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: valkey-pr-review-agent-${{ github.run_id }}
          aws-region: ${{ inputs.aws_region }}

      - name: Run PR reviewer
        env:
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
          TARGET_REPO: ${{ github.repository }}
          CONFIG_PATH: ${{ inputs.config_path }}
          REVIEW_MODE: ${{ inputs.mode }}
          REVIEW_TOKEN: ${{ steps.github-token.outputs.token }}
          AWS_REGION_INPUT: ${{ inputs.aws_region }}
        run: |
          python -m scripts.pr_review_main \
            --repo "${TARGET_REPO}" \
            --config "${CONFIG_PATH}" \
            --mode "${REVIEW_MODE}" \
            --token "${REVIEW_TOKEN}" \
            --aws-region "${AWS_REGION_INPUT}"
