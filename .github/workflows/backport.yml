name: Backport PR

on:
  workflow_call:
    inputs:
      source_pr_number:
        description: "The merged PR number to backport"
        required: true
        type: number
      repo_full_name:
        description: "Full repository name (owner/repo) containing the source PR"
        required: true
        type: string
      target_branch:
        description: "Target release branch to cherry-pick onto (e.g. 8.1)"
        required: true
        type: string
      config_path:
        description: "Path to the backport agent configuration file in the consumer repo"
        required: false
        type: string
        default: ".github/backport-agent.yml"
      aws_region:
        description: "AWS region where Bedrock is available"
        required: false
        type: string
        default: "us-east-1"
      agent_repository:
        description: "Repository containing the backport agent code"
        required: false
        type: string
        default: "sarthakaggarwal97/valkey-ci-agent"
      agent_ref:
        description: "Ref of the backport agent code to check out"
        required: false
        type: string
        default: "main"
      push_repo:
        description: "Push backport branch and create PR on this repo instead of repo_full_name (e.g. a fork)"
        required: false
        type: string
        default: ""
    secrets:
      AWS_ROLE_ARN:
        required: true
      VALKEY_GITHUB_TOKEN:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backport:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: backport-${{ inputs.repo_full_name }}-${{ inputs.source_pr_number }}-${{ inputs.target_branch }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    env:
      CI_BOT_COMMIT_NAME: ${{ vars.CI_BOT_COMMIT_NAME || '' }}
      CI_BOT_COMMIT_EMAIL: ${{ vars.CI_BOT_COMMIT_EMAIL || '' }}
      CI_BOT_REQUIRE_DCO_SIGNOFF: ${{ vars.CI_BOT_REQUIRE_DCO_SIGNOFF || 'false' }}
    steps:
      - name: Checkout agent repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.agent_repository }}
          ref: ${{ inputs.agent_ref }}
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials from OIDC role
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: valkey-backport-agent-${{ github.run_id }}
          aws-region: ${{ inputs.aws_region }}

      - name: Run backport pipeline
        env:
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
          BACKPORT_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN || github.token }}
        run: |
          python -m scripts.backport_main \
            --repo "${{ inputs.repo_full_name }}" \
            --pr-number "${{ inputs.source_pr_number }}" \
            --target-branch "${{ inputs.target_branch }}" \
            --config "${{ inputs.config_path }}" \
            --aws-region "${{ inputs.aws_region }}" \
            ${{ inputs.push_repo && format('--push-repo "{0}"', inputs.push_repo) || '' }}
