name: AI Eval

on:
  pull_request:
    paths:
      - "scripts/stages/**"
      - "scripts/ai_eval/**"
      - "scripts/pipeline.py"
      - "scripts/pipeline_review.py"
      - "scripts/models.py"
      - "scripts/ai_eval/fixtures/**"
      - ".github/workflows/ai-eval.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: "Eval mode"
        required: true
        default: "deterministic"
        type: choice
        options:
          - deterministic
          - live

permissions:
  contents: read

jobs:
  ai-eval-deterministic:
    name: AI eval (deterministic)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || inputs.mode == 'deterministic'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run deterministic AI eval
        run: |
          python -m scripts.ai_eval.harness \
            --mode deterministic \
            --fixtures scripts/ai_eval/fixtures/gold

      - name: Run stage and pipeline unit tests
        run: |
          python -m pytest \
            tests/test_models_stages.py \
            tests/test_stages_rubric.py \
            tests/test_stages_rubric_gate.py \
            tests/test_stages_root_cause.py \
            tests/test_stages_fix_tournament.py \
            tests/test_stages_evidence.py \
            tests/test_stages_review_specialist.py \
            tests/test_ai_eval_scoring.py \
            tests/test_ai_eval_report.py \
            tests/test_pipeline_ci.py \
            tests/test_pipeline_review.py \
            -v

  ai-eval-live:
    name: AI eval (live Bedrock)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'live'
    # Live mode requires AWS credentials — only run on explicit dispatch.
    # This job may fail in forks without Bedrock access; that is acceptable.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run live AI eval
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          python -m scripts.ai_eval.harness --mode live \
            --fixtures scripts/ai_eval/fixtures/gold
