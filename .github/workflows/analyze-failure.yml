name: Analyze CI Failure

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to the agent configuration file in the consumer repo"
        required: false
        type: string
        default: ".github/ci-failure-bot.yml"
      mode:
        description: "Pipeline mode: 'analyze' for failure processing, 'reconcile' for draining queued failures"
        required: false
        type: string
        default: "analyze"
      aws_region:
        description: "AWS region where Bedrock is available"
        required: false
        type: string
        default: "us-east-1"
    secrets:
      AWS_ROLE_ARN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    env:
      CI_BOT_COMMIT_NAME: ${{ vars.CI_BOT_COMMIT_NAME || '' }}
      CI_BOT_COMMIT_EMAIL: ${{ vars.CI_BOT_COMMIT_EMAIL || '' }}
      CI_BOT_REQUIRE_DCO_SIGNOFF: ${{ vars.CI_BOT_REQUIRE_DCO_SIGNOFF || 'false' }}
    steps:
      - name: Resolve called workflow ref
        id: called-workflow
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('valkey-ci-agent');
            const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64url').toString('utf8'));
            const workflowRef = payload.job_workflow_ref || '';
            const marker = '/.github/workflows/';
            const markerIndex = workflowRef.indexOf(marker);
            const refIndex = workflowRef.lastIndexOf('@');
            if (markerIndex <= 0 || refIndex <= markerIndex) {
              core.setFailed(`Could not resolve called workflow repository/ref from job_workflow_ref: ${workflowRef}`);
              return;
            }
            core.setOutput('repository', workflowRef.slice(0, markerIndex));
            core.setOutput('ref', workflowRef.slice(refIndex + 1));

      - name: Checkout agent repository
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.called-workflow.outputs.repository }}
          ref: ${{ steps.called-workflow.outputs.ref }}
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials from OIDC role
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: valkey-ci-agent-${{ github.run_id }}
          aws-region: ${{ inputs.aws_region }}

      - name: Run analysis pipeline
        if: inputs.mode == 'analyze'
        env:
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          python -m scripts.main \
            --repo "${{ github.event.workflow_run.repository.full_name || github.repository }}" \
            --run-id "${{ github.event.workflow_run.id }}" \
            --config "${{ inputs.config_path }}" \
            --token "${{ github.token }}" \
            --aws-region "${{ inputs.aws_region }}"

      - name: Run reconciliation
        if: inputs.mode == 'reconcile'
        env:
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          python -m scripts.main \
            --repo "${{ github.repository }}" \
            --config "${{ inputs.config_path }}" \
            --token "${{ github.token }}" \
            --aws-region "${{ inputs.aws_region }}" \
            --mode reconcile
