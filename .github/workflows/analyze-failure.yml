name: Analyze CI Failure

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to the bot configuration file in the consumer repo"
        required: false
        type: string
        default: ".github/ci-failure-bot.yml"
      bot_repository:
        description: "Repository containing the CI failure bot code"
        required: false
        type: string
        default: "valkey-io/valkey-ci-bot"
      bot_ref:
        description: "Git ref of the CI failure bot repository to check out"
        required: false
        type: string
        default: "v1"
      mode:
        description: "Pipeline mode: 'analyze' for failure processing, 'reconcile' for draining queued failures"
        required: false
        type: string
        default: "analyze"
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      GITHUB_TOKEN:
        required: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout bot repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.bot_repository }}
          ref: ${{ inputs.bot_ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis pipeline
        if: inputs.mode == 'analyze'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python scripts/main.py \
            --repo "${{ github.event.workflow_run.repository.full_name || github.repository }}" \
            --run-id "${{ github.event.workflow_run.id }}" \
            --config "${{ inputs.config_path }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --aws-region "${{ secrets.AWS_REGION }}"

      - name: Run reconciliation
        if: inputs.mode == 'reconcile'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python scripts/main.py \
            --repo "${{ github.repository }}" \
            --config "${{ inputs.config_path }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --aws-region "${{ secrets.AWS_REGION }}" \
            --mode reconcile
