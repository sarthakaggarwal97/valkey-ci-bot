name: Demo Valkey CI Agent

on:
  workflow_dispatch:
    inputs:
      run_dashboard:
        description: "Refresh the capability dashboard and site."
        required: false
        default: true
        type: boolean
      run_replay:
        description: "Run the replay lab against the acceptance manifest."
        required: false
        default: true
        type: boolean
      replay_manifest:
        description: "Replay manifest path."
        required: false
        default: "examples/valkey-acceptance.yml"
        type: string
      replay_run_models:
        description: "Run Bedrock model passes in the replay lab."
        required: false
        default: false
        type: boolean
      run_daily:
        description: "Run the Daily monitor as part of the demo bundle."
        required: false
        default: true
        type: boolean
      daily_dry_run:
        description: "Keep the Daily monitor in dry-run mode."
        required: false
        default: true
        type: boolean
      daily_max_runs:
        description: "Maximum recent Daily runs to inspect."
        required: false
        default: "3"
        type: string
      run_fuzzer:
        description: "Run the Fuzzer monitor as part of the demo bundle."
        required: false
        default: true
        type: boolean
      fuzzer_dry_run:
        description: "Keep the Fuzzer monitor in dry-run mode."
        required: false
        default: true
        type: boolean
      fuzzer_max_runs:
        description: "Maximum recent fuzzer runs to inspect."
        required: false
        default: "1"
        type: string
      review_target_repo:
        description: "Optional owner/repo for a live external review demo."
        required: false
        default: ""
        type: string
      review_pr_number:
        description: "Optional PR number for the live external review demo."
        required: false
        default: ""
        type: string
      review_config_path:
        description: "Reviewer config path for the external review demo."
        required: false
        default: ".github/pr-review-bot.yml"
        type: string
      publish_site:
        description: "Force a fresh Pages publish after the child workflows finish."
        required: false
        default: true
        type: boolean

permissions:
  actions: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: demo-valkey-ci-agent
      cancel-in-progress: false
    steps:
      - name: Check out agent repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: pip install -r requirements.txt

      - name: Check out agent data snapshots
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          ref: bot-data
          path: bot-data
          persist-credentials: false
          fetch-depth: 1

      - name: Build demo bundle
        shell: bash
        env:
          DEMO_REPOSITORY: ${{ github.repository }}
          DEMO_TOKEN: ${{ github.token }}
          DEMO_REF: ${{ github.ref_name }}
          RUN_DASHBOARD: ${{ github.event.inputs.run_dashboard || 'true' }}
          RUN_REPLAY: ${{ github.event.inputs.run_replay || 'true' }}
          REPLAY_MANIFEST: ${{ github.event.inputs.replay_manifest || 'examples/valkey-acceptance.yml' }}
          REPLAY_RUN_MODELS: ${{ github.event.inputs.replay_run_models || 'false' }}
          RUN_DAILY: ${{ github.event.inputs.run_daily || 'true' }}
          DAILY_DRY_RUN: ${{ github.event.inputs.daily_dry_run || 'true' }}
          DAILY_MAX_RUNS: ${{ github.event.inputs.daily_max_runs || '' }}
          RUN_FUZZER: ${{ github.event.inputs.run_fuzzer || 'true' }}
          FUZZER_DRY_RUN: ${{ github.event.inputs.fuzzer_dry_run || 'true' }}
          FUZZER_MAX_RUNS: ${{ github.event.inputs.fuzzer_max_runs || '' }}
          REVIEW_TARGET_REPO: ${{ github.event.inputs.review_target_repo || '' }}
          REVIEW_PR_NUMBER: ${{ github.event.inputs.review_pr_number || '' }}
          REVIEW_CONFIG_PATH: ${{ github.event.inputs.review_config_path || '.github/pr-review-bot.yml' }}
          PUBLISH_SITE: ${{ github.event.inputs.publish_site || 'true' }}
        run: |
          set -euo pipefail
          repo="${DEMO_REPOSITORY}"
          owner="${repo%%/*}"
          repository="${repo#*/}"
          pages_url="https://${owner}.github.io/${repository}/"
          if [[ "${REPLAY_MANIFEST}" == /* || "${REPLAY_MANIFEST}" == *..* || "${REPLAY_MANIFEST}" == -* ]]; then
            echo "Invalid replay manifest path: ${REPLAY_MANIFEST}" >&2
            exit 1
          fi
          if [[ "${REVIEW_CONFIG_PATH}" == /* || "${REVIEW_CONFIG_PATH}" == *..* || "${REVIEW_CONFIG_PATH}" == -* ]]; then
            echo "Invalid review config path: ${REVIEW_CONFIG_PATH}" >&2
            exit 1
          fi
          if [[ -n "${REVIEW_TARGET_REPO}" && ! "${REVIEW_TARGET_REPO}" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid review target repo: ${REVIEW_TARGET_REPO}" >&2
            exit 1
          fi
          if [[ -n "${REVIEW_PR_NUMBER}" && ! "${REVIEW_PR_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "Invalid review PR number: ${REVIEW_PR_NUMBER}" >&2
            exit 1
          fi
          if [[ -n "${DAILY_MAX_RUNS}" && ! "${DAILY_MAX_RUNS}" =~ ^[0-9]+$ ]]; then
            echo "Invalid daily max runs: ${DAILY_MAX_RUNS}" >&2
            exit 1
          fi
          if [[ -n "${FUZZER_MAX_RUNS}" && ! "${FUZZER_MAX_RUNS}" =~ ^[0-9]+$ ]]; then
            echo "Invalid fuzzer max runs: ${FUZZER_MAX_RUNS}" >&2
            exit 1
          fi
          args=(
            -m scripts.demo_bundle
            --repo "${repo}"
            --token "${DEMO_TOKEN}"
            --ref "${DEMO_REF}"
            --pages-url "${pages_url}"
            --failure-store "bot-data/failure-store.json"
            --replay-manifest "${REPLAY_MANIFEST}"
            --review-target-repo "${REVIEW_TARGET_REPO}"
            --review-config-path "${REVIEW_CONFIG_PATH}"
            --output-markdown demo-report.md
            --output-json demo-report.json
            --output-html demo-report.html
            --site-dir demo-site
          )

          if [[ "${RUN_DASHBOARD}" == "true" ]]; then
            args+=(--run-dashboard)
          fi
          if [[ "${RUN_REPLAY}" == "true" ]]; then
            args+=(--run-replay)
          fi
          if [[ "${REPLAY_RUN_MODELS}" == "true" ]]; then
            args+=(--replay-run-models)
          fi
          if [[ "${RUN_DAILY}" == "true" ]]; then
            args+=(--run-daily)
          fi
          if [[ "${DAILY_DRY_RUN}" == "true" ]]; then
            args+=(--daily-dry-run)
          fi
          if [[ "${RUN_FUZZER}" == "true" ]]; then
            args+=(--run-fuzzer)
          fi
          if [[ "${FUZZER_DRY_RUN}" == "true" ]]; then
            args+=(--fuzzer-dry-run)
          fi
          if [[ "${PUBLISH_SITE}" == "true" ]]; then
            args+=(--publish-site)
          fi
          if [[ -n "${REVIEW_PR_NUMBER}" ]]; then
            args+=(--review-pr-number "${REVIEW_PR_NUMBER}")
          fi
          if [[ -n "${DAILY_MAX_RUNS}" ]]; then
            args+=(--daily-max-runs "${DAILY_MAX_RUNS}")
          fi
          if [[ -n "${FUZZER_MAX_RUNS}" ]]; then
            args+=(--fuzzer-max-runs "${FUZZER_MAX_RUNS}")
          fi

          python3 "${args[@]}"

      - name: Publish demo report to summary
        shell: bash
        run: cat demo-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload demo bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: valkey-ci-demo-bundle-${{ github.run_id }}
          path: |
            demo-report.md
            demo-report.json
            demo-report.html
            demo-site
          retention-days: 30
