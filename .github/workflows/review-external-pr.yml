name: Review External Pull Request

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Repository containing the pull request to review (owner/repo)"
        required: true
        type: string
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string
      config_path:
        description: "Reviewer config path. Target repo is checked first, then this agent repo."
        required: false
        default: ".github/pr-review-bot.yml"
        type: string
      aws_region:
        description: "AWS region where Bedrock is available"
        required: false
        default: "us-east-1"
        type: string

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: review-external-pr-${{ github.event.inputs.target_repo }}-${{ github.event.inputs.pr_number }}
      cancel-in-progress: false
    env:
      AWS_REGION: ${{ github.event.inputs.aws_region || vars.AWS_REGION || 'us-east-1' }}
      TARGET_REPO: ${{ github.event.inputs.target_repo }}
      TARGET_PR_NUMBER: ${{ github.event.inputs.pr_number }}
      TARGET_GITHUB_APP_ID: ${{ vars.VALKEY_GITHUB_APP_ID || '' }}
      CONFIG_PATH: ${{ github.event.inputs.config_path || '.github/pr-review-bot.yml' }}
    steps:
      - name: Check out agent repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve target repository authentication mode
        id: target-auth
        shell: bash
        env:
          TARGET_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
          TARGET_GITHUB_APP_PRIVATE_KEY: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "${TARGET_GITHUB_TOKEN}" ]]; then
            echo "use-app=false" >> "$GITHUB_OUTPUT"
          elif [[ -n "${TARGET_GITHUB_APP_ID}" && -n "${TARGET_GITHUB_APP_PRIVATE_KEY}" ]]; then
            echo "use-app=true" >> "$GITHUB_OUTPUT"
          else
            echo "Configure either VALKEY_GITHUB_TOKEN or VALKEY_GITHUB_APP_ID plus VALKEY_GITHUB_APP_PRIVATE_KEY." >&2
            exit 1
          fi

      - name: Resolve target repository
        id: target-repo
        shell: bash
        run: |
          set -euo pipefail
          owner="${TARGET_REPO%%/*}"
          repository="${TARGET_REPO#*/}"
          if [[ -z "${owner}" || -z "${repository}" || "${owner}" == "${repository}" ]]; then
            echo "Expected TARGET_REPO in owner/repo format, got '${TARGET_REPO}'." >&2
            exit 1
          fi
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "repository=${repository}" >> "$GITHUB_OUTPUT"

      - name: Create target repository GitHub App token
        id: app-token
        if: ${{ steps.target-auth.outputs.use-app == 'true' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.TARGET_GITHUB_APP_ID }}
          private-key: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ steps.target-repo.outputs.owner }}
          repositories: ${{ steps.target-repo.outputs.repository }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Select target repository token
        id: target-token
        shell: bash
        env:
          TARGET_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
        run: |
          if [[ -n "${TARGET_GITHUB_TOKEN}" ]]; then
            echo "token=${TARGET_GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            echo "token=${{ steps.app-token.outputs.token }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials from OIDC role
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: external-pr-review-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Review target pull request
        shell: bash
        env:
          TARGET_TOKEN: ${{ steps.target-token.outputs.token }}
          STATE_TOKEN: ${{ github.token }}
          STATE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ ! "${TARGET_PR_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "Expected TARGET_PR_NUMBER to be numeric, got '${TARGET_PR_NUMBER}'." >&2
            exit 1
          fi
          if [[ "${CONFIG_PATH}" == /* || "${CONFIG_PATH}" == *..* || "${CONFIG_PATH}" == -* ]]; then
            echo "Invalid CONFIG_PATH: ${CONFIG_PATH}" >&2
            exit 1
          fi
          python -m scripts.pr_review_main \
            --repo "${TARGET_REPO}" \
            --pr-number "${TARGET_PR_NUMBER}" \
            --config "${CONFIG_PATH}" \
            --mode review \
            --token "${TARGET_TOKEN}" \
            --state-token "${STATE_TOKEN}" \
            --state-repo "${STATE_REPO}" \
            --aws-region "${AWS_REGION}"
