name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff lint
        run: ruff check scripts/ tests/

      - name: Run pytest with coverage
        run: pytest --cov=scripts --cov-report=term-missing --cov-report=xml --cov-fail-under=74 -v

      - name: Run mypy type checking
        run: mypy scripts/ --ignore-missing-imports

  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run workflow acceptance gate
        run: |
          python3 -m scripts.valkey_acceptance \
            --manifest examples/ci-agent-acceptance.yml \
            --output acceptance-report.md \
            --json-output acceptance-report.json \
            --fail-on-followup

      - name: Publish acceptance report to summary
        run: cat acceptance-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload acceptance report
        uses: actions/upload-artifact@v4
        with:
          name: ci-agent-acceptance-${{ github.run_id }}
          path: |
            acceptance-report.md
            acceptance-report.json
