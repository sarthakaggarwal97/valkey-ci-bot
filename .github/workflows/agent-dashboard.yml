name: CI Agent Capability Dashboard

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ci-agent-capability-dashboard
      cancel-in-progress: true
    steps:
      - name: Check out agent repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: pip install -r requirements.txt

      - name: Check out agent data snapshots
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          ref: bot-data
          path: bot-data
          persist-credentials: false
          fetch-depth: 1

      - name: Generate daily CI health report
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python3 -m scripts.daily_health_report \
            --repo "valkey-io/valkey" \
            --workflow "daily.yml" "weekly.yml" \
            --branch "unstable" \
            --days 14 \
            --token "${GITHUB_TOKEN}" \
            --output daily-health-report.html \
            --output-json daily-health-report.json

      - name: Run replay acceptance scorecard
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python3 -m scripts.valkey_acceptance \
            --manifest examples/valkey-acceptance.yml \
            --token "${GITHUB_TOKEN}" \
            --output acceptance-report.md \
            --json-output acceptance-report.json

      - name: Generate capability dashboard
        shell: bash
        run: |
          python3 -m scripts.agent_dashboard \
            --failure-store bot-data/failure-store.json \
            --rate-state bot-data/rate-state.json \
            --monitor-state bot-data/monitor-state.json \
            --review-state bot-data/review-state.json \
            --event-log bot-data/agent-events.jsonl \
            --acceptance-result acceptance-report.json \
            --daily-health daily-health-report.json \
            --output-markdown agent-dashboard.md \
            --output-json agent-dashboard.json \
            --output-html agent-dashboard.html

      - name: Generate observability site
        shell: bash
        run: |
          python3 -m scripts.agent_dashboard_site \
            --dashboard-json agent-dashboard.json \
            --site-dir dashboard-site

      - name: Publish dashboard to workflow summary
        shell: bash
        run: cat agent-dashboard.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-agent-capability-dashboard-${{ github.run_id }}
          path: |
            agent-dashboard.md
            agent-dashboard.json
            agent-dashboard.html
            acceptance-report.md
            acceptance-report.json
            daily-health-report.html
            daily-health-report.json
            dashboard-site
          retention-days: 30
