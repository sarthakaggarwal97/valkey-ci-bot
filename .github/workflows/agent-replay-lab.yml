name: CI Agent Replay Lab

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Acceptance/replay manifest path."
        required: false
        default: "examples/valkey-acceptance.yml"
        type: string
      run_models:
        description: "Run Bedrock model passes in addition to deterministic policy checks."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  replay-lab:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out agent repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials from OIDC role
        if: ${{ github.event.inputs.run_models == 'true' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: ci-agent-replay-lab-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run replay lab
        shell: bash
        run: |
          set -euo pipefail
          args=(
            -m scripts.valkey_acceptance
            --manifest "${{ github.event.inputs.manifest }}"
            --token "${{ github.token }}"
            --aws-region "${AWS_REGION}"
            --output acceptance-report.md
            --json-output acceptance-report.json
          )

          if [[ "${{ github.event.inputs.run_models }}" == "true" ]]; then
            args+=(--run-models)
          fi

          python3 "${args[@]}"

      - name: Publish replay report to summary
        shell: bash
        run: cat acceptance-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload replay lab artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-agent-replay-lab-${{ github.run_id }}
          path: |
            acceptance-report.md
            acceptance-report.json
          retention-days: 30
